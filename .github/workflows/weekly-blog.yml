# Runs Mon/Wed/Fri ~9:13am ET: AI-generate a fresh SWFL blog post, publish it to
  # the site (auto-deploys via Vercel), and cross-post it to Instagram.
  name: Blog automation (Mon/Wed/Fri)

  on:
    schedule:
      - cron: "13 13 * * 1,3,5"
    workflow_dispatch: {}

  permissions:
    contents: write

  jobs:
    publish:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: "20"

        - name: Generate & publish a blog post
          env:
            TZ: America/New_York
            ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
            BLOG_MODEL: ${{ vars.BLOG_MODEL }}
            META: ${{ secrets.META }}
            IG_USER_ID: ${{ secrets.IG_USER_ID }}
            IMAGE_API_KEY: ${{ secrets.IMAGE_API_KEY }}
            IMAGE_API_URL: ${{ vars.IMAGE_API_URL }}
            IMAGE_MODEL: ${{ vars.IMAGE_MODEL }}
          run: node tools/generate-post.js

        - name: Commit & push
          run: |
            if [ -n "$(git status --porcelain)" ]; then
              git config user.name "safewheels-bot"
              git config user.email "github-actions@users.noreply.github.com"
              git add -A
              git commit -m "Publish blog post (automated)"
              git push
            else
              echo "Nothing to publish."
            fi

        - name: Cross-post to Instagram
          env:
            META: ${{ secrets.META }}
            IG_USER_ID: ${{ secrets.IG_USER_ID }}
          run: node tools/post-to-instagram.js
