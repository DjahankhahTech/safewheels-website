name: Weekly blog post
  on:
    schedule:
      - cron: "13 13 * * 3"
    workflow_dispatch: {}
  permissions:
    contents: write
  jobs:
    publish:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with: 
            node-version: "20"
        - name: Publish next queued post
          env:
            TZ: America/New_York
          run: node tools/publish-next.js
        - name: Commit & push if changed
          run: |
            if [ -n "$(git status --porcelain)" ]; then
              git config user.name "safewheels-bot"
              git config user.email 
  "github-actions[bot]@users.noreply.github.com"
              git add -A
              git commit -m "Publish weekly blog post"
              git push
            else
              echo "Nothing to publish."
            fi
