 name: IG Doctor
  
  on:
    workflow_dispatch: {}

  jobs:
    doctor:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: "20"
        - name: Diagnose Instagram connection
          env:
            META: ${{ secrets.META }}
          run: node tools/ig-doctor.js
